<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Экзамен СЛР | XREAL HUD</title>
<style>
:root{
  --bg:#030303;
  --panel:rgba(10,10,10,.84);
  --panel2:rgba(20,20,20,.95);
  --text:#fff;
  --muted:#b8b8b8;
  --green:#6fd39a;
  --blue:#4f83f1;
  --red:#b84f5b;
  --yellow:#d8a23a;
  --border:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 78% 44%, rgba(255,255,255,.05), transparent 20%),
    radial-gradient(circle at 23% 30%, rgba(79,131,241,.12), transparent 23%),
    #030303;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
.hud{position:relative;width:100vw;height:100vh}
.clear{
  position:absolute;
  right:34px;
  top:34px;
  width:48vw;
  height:calc(100vh - 68px);
  border-radius:30px;
  border:1px dashed rgba(255,255,255,.08);
  color:rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:28px;
  font-weight:950;
  pointer-events:none;
}
.panel{
  position:absolute;
  left:24px;
  top:24px;
  width:39vw;
  min-width:400px;
  max-width:590px;
  padding:22px;
  border-radius:28px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 70px rgba(0,0,0,.5);
}
.panel.right{left:auto;right:24px}
.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:13px;
  font-weight:850;
}
.dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 14px rgba(111,211,154,.8);
}
.phase{
  font-size:17px;
  color:var(--muted);
  font-weight:850;
  margin-bottom:7px;
}
.title{
  font-size:39px;
  line-height:1.05;
  font-weight:950;
  margin-bottom:14px;
}
.text{
  font-size:28px;
  line-height:1.22;
  font-weight:780;
  margin-bottom:14px;
}
.hint{
  display:none;
  margin-top:14px;
  padding:15px;
  border-radius:20px;
  font-size:21px;
  line-height:1.3;
  white-space:pre-line;
}
.hint.show{display:block}
.info{background:rgba(79,131,241,.14);border:1px solid rgba(79,131,241,.35);color:#e4ecff}
.ok{background:rgba(46,159,91,.16);border:1px solid rgba(46,159,91,.38);color:#dff7e8}
.bad{background:rgba(184,79,91,.16);border:1px solid rgba(184,79,91,.38);color:#ffe0e5}
.warn{background:rgba(216,162,58,.16);border:1px solid rgba(216,162,58,.38);color:#ffe9bc}
.quiz{
  display:none;
  margin-top:16px;
  padding:14px;
  border-radius:22px;
  background:rgba(79,131,241,.11);
  border:1px solid rgba(79,131,241,.3);
}
.quiz.show{display:block}
.question{
  font-size:23px;
  line-height:1.25;
  font-weight:900;
  margin-bottom:12px;
}
.answers{display:grid;gap:10px}
.answer{
  border:1px solid var(--border);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:17px;
  padding:15px;
  font-size:20px;
  font-weight:850;
  text-align:left;
}
.answer.correct{background:rgba(46,159,91,.25);border-color:rgba(46,159,91,.7)}
.answer.wrong{background:rgba(184,79,91,.25);border-color:rgba(184,79,91,.7)}
.answer:disabled{opacity:.9}
.progressText{
  display:flex;
  justify-content:space-between;
  color:var(--muted);
  font-size:13px;
  font-weight:850;
  margin-top:18px;
  margin-bottom:8px;
}
.bar{
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.1);
}
.fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  transition:.25s;
}
.controls{
  position:absolute;
  left:24px;
  bottom:24px;
  width:39vw;
  min-width:400px;
  max-width:590px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
}
.controls.right{left:auto;right:24px}
.btn{
  border:1px solid var(--border);
  background:var(--panel2);
  color:#fff;
  border-radius:17px;
  padding:13px 8px;
  font-size:15px;
  font-weight:900;
}
.btn.primary{background:var(--blue);border-color:transparent}
.btn.voice{background:var(--green);color:#07110c;border-color:transparent}
.start{
  position:absolute;
  inset:0;
  z-index:9;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.88);
  padding:22px;
}
.startCard{
  width:min(720px,90vw);
  padding:28px;
  border-radius:30px;
  background:var(--panel2);
  border:1px solid var(--border);
  text-align:center;
}
.startTitle{
  font-size:40px;
  font-weight:950;
  margin-bottom:10px;
}
.startText{
  color:var(--muted);
  font-size:20px;
  line-height:1.35;
  margin-bottom:18px;
}
.startBtn{
  width:100%;
  border:1px solid var(--border);
  background:var(--green);
  color:#07110c;
  border-radius:22px;
  padding:18px;
  font-size:24px;
  font-weight:950;
}
.result{
  display:none;
  margin-top:16px;
  padding:16px;
  border-radius:22px;
  background:rgba(111,211,154,.14);
  border:1px solid rgba(111,211,154,.35);
  font-size:22px;
  line-height:1.35;
  white-space:pre-line;
}
.result.show{display:block}
@media(max-width:800px){
  body{overflow:auto;height:auto}
  .hud{height:auto;min-height:100vh;padding:12px}
  .panel,.panel.right,.controls,.controls.right{
    position:static;
    width:100%;
    min-width:0;
    max-width:none;
    margin-bottom:12px;
  }
  .clear{display:none}
  .controls{grid-template-columns:repeat(2,1fr)}
  .title{font-size:34px}
  .text{font-size:23px}
}
</style>
</head>

<body>
<div class="hud">
  <div class="clear">ОСНОВНОЙ ОБЗОР<br>МАНЕКЕН / РУКИ</div>

  <div class="start" id="start">
    <div class="startCard">
      <div class="startTitle">Экзамен СЛР</div>
      <div class="startText">
        Логика экзамена: сначала действие без подсказок, потом вопрос, затем объяснение после ответа.
      </div>
      <button class="startBtn" onclick="startExam()">Начать экзамен</button>
    </div>
  </div>

  <main class="panel" id="panel">
    <div class="top">
      <div class="badge"><span class="dot"></span> CPR EXAM</div>
      <div class="badge" id="score">0 / 0</div>
    </div>

    <div class="phase" id="phase">Ожидание</div>
    <div class="title" id="title">Готов</div>
    <div class="text" id="text">Нажми «Начать экзамен».</div>

    <div class="hint" id="hint"></div>

    <div class="quiz" id="quiz">
      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
    </div>

    <div class="result" id="result"></div>

    <div class="progressText">
      <span id="counter">Шаг —</span>
      <span id="percent">0%</span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </main>

  <div class="controls" id="controls">
    <button class="btn voice" onclick="listen()">🎤 Голос</button>
    <button class="btn primary" onclick="next()">Дальше</button>
    <button class="btn" onclick="explain()">Объясни</button>
    <button class="btn" onclick="toggleSide()">↔ Сторона</button>
  </div>
</div>

      { text: "Пока не надоест", correct: false }
    ],
    correctText: "Верно. Продолжаем до помощи, AED или признаков жизни.",
    wrongText: "Неверно. СЛР продолжают до помощи, AED, признаков жизни или невозможности продолжать.",
    explanation: "Важно минимизировать паузы и не прекращать помощь без причины."
  },
  {
    actionTitle: "Признаки жизни",
    actionText: "Пострадавший начал дышать.",
    question: "Что делать, если дыхание восстановилось, но сознания нет?",
    answers: [
      { text: "Перевести в устойчивое боковое положение и контролировать", correct: true },
      { text: "Оставить на спине и уйти", correct: false },
      { text: "Продолжать компрессии без оценки", correct: false }
    ],
    correctText: "Верно. Боковое положение и контроль.",
    wrongText: "Неверно. Нужно устойчивое боковое положение и контроль состояния.",
    explanation: "Если человек дышит, но без сознания, боковое положение помогает снизить риск западения языка и аспирации."
  }
];

let stepIndex = 0;
let phase = "action";
let correct = 0;
let total = 0;
let answered = false;
let started = false;
let audioReady = false;
let lastText = "";
let timer = null;
let metronome = null;
let right = false;

const el = {
  start: document.getElementById("start"),
  panel: document.getElementById("panel"),
  controls: document.getElementById("controls"),
  phase: document.getElementById("phase"),
  title: document.getElementById("title"),
  text: document.getElementById("text"),
  hint: document.getElementById("hint"),
  quiz: document.getElementById("quiz"),
  question: document.getElementById("question"),
  answers: document.getElementById("answers"),
  result: document.getElementById("result"),
  fill: document.getElementById("fill"),
  percent: document.getElementById("percent"),
  counter: document.getElementById("counter"),
  score: document.getElementById("score")
};

function primeAudio(){
  if(audioReady) return;
  audioReady = true;
  const msg = new SpeechSynthesisUtterance("Звук включён");
  msg.lang = "ru-RU";
  msg.volume = 0.01;
  speechSynthesis.speak(msg);
}

function speak(text){
  lastText = text;
  if(!audioReady) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ru-RU";
  msg.rate = 0.95;
  speechSynthesis.speak(msg);
}

function setHint(text, type="info"){
  el.hint.textContent = text || "";
  el.hint.className = text ? `hint show ${type}` : "hint";
}

function currentStep(){
  return examSteps[stepIndex];
}

function startExam(){
  primeAudio();
  started = true;
  stepIndex = 0;
  phase = "action";
  correct = 0;
  total = 0;
  answered = false;
  el.start.style.display = "none";
  el.result.classList.remove("show");
  render();
}

function render(){
  stopTimer();
  stopMetronome();
  setHint("");
  hideQuiz();
  answered = false;
  el.result.classList.remove("show");

  const step = currentStep();
  updateProgress();

  if(phase === "action"){
    el.phase.textContent = "Этап: действие";
    el.title.textContent = step.actionTitle;
    el.text.textContent = step.actionText;
    speak(`${step.actionTitle}. ${step.actionText}`);
  }

  if(phase === "question"){
    el.phase.textContent = "Этап: вопрос";
    el.title.textContent = "Проверка";
    el.text.textContent = "Ответь на вопрос.";
    showQuiz(step);
    speak(`Вопрос. ${step.question}`);
  }
}

function updateProgress(){
  const progress = Math.round(((stepIndex + 1) / examSteps.length) * 100);
  el.fill.style.width = progress + "%";
  el.percent.textContent = progress + "%";
  el.counter.textContent = `Шаг ${stepIndex + 1} / ${examSteps.length}`;
  el.score.textContent = `${correct} / ${total}`;
}

function showQuiz(step){
  el.quiz.classList.add("show");
  el.question.textContent = step.question;
  el.answers.innerHTML = "";

  step.answers.forEach(answer => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.textContent = answer.text;
    btn.onclick = () => answerQuestion(answer, btn);
    el.answers.appendChild(btn);
  });
}

function hideQuiz(){
  el.quiz.classList.remove("show");
  el.question.textContent = "";
  el.answers.innerHTML = "";
}

function answerQuestion(answer, selectedBtn){
  if(answered) return;

  answered = true;
  total++;

  const step = currentStep();
  const buttons = el.answers.querySelectorAll(".answer");

  buttons.forEach((btn, index) => {
    btn.disabled = true;
    if(step.answers[index].correct){
      btn.classList.add("correct");
    }
  });

  if(answer.correct){
    correct++;
    selectedBtn.classList.add("correct");
    setHint(`${step.correctText}\n\nОбъяснение: ${step.explanation}`, "ok");
    speak(step.correctText);
  }else{
    selectedBtn.classList.add("wrong");
    setHint(`${step.wrongText}\n\nОбъяснение: ${step.explanation}`, "bad");
    speak(step.wrongText);
  }

  updateProgress();
}

function next(){
  if(!started) return;

  if(phase === "action"){
    phase = "question";
    render();
    return;
  }

  if(phase === "question"){
    if(!answered){
      setHint("Сначала ответь на вопрос.", "warn");
      speak("Сначала ответь на вопрос.");
      return;
    }

    if(stepIndex < examSteps.length - 1){
      stepIndex++;
      phase = "action";
      render();
    }else{
      finish();
    }
  }
}

function explain(){
  if(!started) return;

  const step = currentStep();

  if(phase === "action"){
    setHint("В режиме экзамена объяснение появится после ответа. Выполни действие и нажми «Дальше».", "warn");
    speak("В режиме экзамена объяснение появится после ответа.");
    return;
  }

  if(phase === "question" && !answered){
    setHint("Сначала ответь на вопрос. После ответа появится объяснение.", "warn");
    speak("Сначала ответь на вопрос.");
    return;
  }

  if(phase === "question" && answered){
    setHint(`Объяснение: ${step.explanation}`, "info");
    speak(step.explanation);
  }
}

function finish(){
  stopTimer();
  stopMetronome();
  hideQuiz();

  const percent = total ? Math.round((correct / total) * 100) : 0;
  let level = "Нужно повторить алгоритм";

  if(percent >= 85){
    level = "Экзамен пройден отлично";
  }else if(percent >= 70){
    level = "Экзамен пройден";
  }

  el.phase.textContent = "Экзамен завершён";
  el.title.textContent = "Результат";
  el.text.textContent = "Экзамен СЛР завершён.";
  el.result.textContent = `Результат: ${correct} / ${total} (${percent}%).\nИтог: ${level}.\n\nОшибки можно разобрать с инструктором или повторить сценарий.`;
  el.result.classList.add("show");
  setHint("Готово.", "ok");
  speak(`Экзамен завершён. Результат ${correct} из ${total}.`);
}

function startTimer(){
  let sec = 10;
  setHint(`Таймер: ${sec} секунд`, "warn");

  timer = setInterval(() => {
    sec--;
    setHint(`Таймер: ${sec} секунд`, "warn");

    if(sec <= 0){
      stopTimer();
      setHint("Время проверки завершено.", "ok");
      speak("Время проверки завершено.");
    }
  }, 1000);
}

function stopTimer(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

function startMetronome(){
  let count = 0;
  setHint("Метроном включён.", "warn");

  metronome = setInterval(() => {
    count++;
    if(count % 10 === 0){
      setHint(`Метроном: ${count} нажатий`, "warn");
    }
  }, 600);
}

function stopMetronome(){
  if(metronome){
    clearInterval(metronome);
    metronome = null;
  }
}

function toggleSide(){
  right = !right;
  el.panel.classList.toggle("right", right);
  el.controls.classList.toggle("right", right);
}

function listen(){
  primeAudio();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    setHint("Голос не поддерживается этим браузером.", "bad");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ru-RU";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  setHint("Слушаю...", "info");
  recognition.start();

  recognition.onresult = event => {
    const text = event.results[0][0].transcript.trim().toLowerCase();
    handleVoice(text);
  };

  recognition.onerror = () => {
    setHint("Не удалось распознать голос.", "bad");
  };
}

function handleVoice(text){
  if(text.includes("начать")){
    startExam();
    return;
  }

  if(text.includes("дальше")){
    next();
    return;
  }

  if(text.includes("объясни")){
    explain();
    return;
  }

  if(text.includes("повтори")){
    speak(lastText || "Пока нечего повторять.");
    return;
  }

  if(text.includes("сторона")){
    toggleSide();
    return;
  }

  if(text.includes("безопас")){
    setHint("Принято: безопасность оценена. Нажми или скажи «дальше».", "ok");
    speak("Принято.");
    return;
  }

  if(text.includes("сознания нет") || text.includes("нет сознания")){
    setHint("Принято: сознание отсутствует.", "warn");
    speak("Принято. Сознание отсутствует.");
    return;
  }

  if(text.includes("не дышит") || text.includes("дыхания нет")){
    setHint("Принято: дыхание отсутствует.", "warn");
    speak("Принято. Дыхание отсутствует.");
    return;
  }

  if(text.includes("пульса нет")){
    setHint("Принято: пульс отсутствует.", "warn");
    speak("Принято. Пульс отсутствует.");
    return;
  }

  if(text.includes("очнулся") || text.includes("дышит")){
    setHint("Принято: появились признаки жизни.", "ok");
    speak("Принято. Признаки жизни появились.");
    return;
  }

  setHint("Команда не распознана. Скажи: дальше, объясни, повтори.", "warn");
  speak("Команда не распознана.");
}

const params = new URLSearchParams(location.search);

if(params.get("pos") === "right"){
  toggleSide();
}

if(params.get("start") === "1"){
  startExam();
}
</script>
