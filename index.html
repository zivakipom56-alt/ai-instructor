<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-инструктор</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      margin-bottom: 30px;
    }

    button {
      font-size: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00e676;
    }
  </style>
</head>

<body>

<div class="container">
  <h1 id="title">AI-инструктор</h1>
  <p id="text">Нажмите кнопку для запуска</p>

  <button onclick="startInstructor()">▶️ Запустить инструктора</button>
</div>

<script>
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'ru-RU';
  msg.rate = 1;
  msg.pitch = 1;
  speechSynthesis.speak(msg);
}

// сценарии
const scenarios = {
  cpr: {
    title: "СЛР",
    text: "Начинаем сердечно-легочную реанимацию",
    voice: "Начинаем сердечно-легочную реанимацию. Проверьте сознание пострадавшего. Затем проверьте дыхание. Начните компрессии грудной клетки."
  },
  aed: {
    title: "AED",
    text: "Работа с дефибриллятором",
    voice: "Подключите дефибриллятор. Приклейте электроды на грудную клетку. Следуйте голосовым инструкциям устройства."
  },
  triage: {
    title: "Осмотр",
    text: "Первичная оценка пострадавшего",
    voice: "Проверьте безопасность. Оцените сознание. Проверьте дыхание и пульс. Вызовите помощь."
  }
};

function getScenario() {
  const params = new URLSearchParams(window.location.search);
  return params.get("scenario");
}

function startInstructor() {
  const scenario = getScenario();

  if (scenario && scenarios[scenario]) {
    const s = scenarios[scenario];

    document.getElementById("title").innerText = s.title;
    document.getElementById("text").innerText = s.text;

    speak(s.voice);
  } else {
    speak("Выберите сценарий. Сканируйте QR код.");
  }
}
</script>

</body>
</html>
