<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-инструктор • Resusci Anne</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  padding:20px;
}

.container {
  max-width:700px;
  margin:auto;
}

.card {
  background:#0f1116;
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:600;
}

.primary { background:#3b82f6; color:white; }
.voice { background:#22c55e; color:black; }
.warn { background:#f59e0b; }
.danger { background:#ef4444; }

.hidden { display:none; }

.correct { color:#22c55e; }
.wrong { color:#ef4444; }

.chip {
  display:inline-block;
  padding:8px 12px;
  background:#1f2937;
  border-radius:999px;
  margin-right:5px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>AI-инструктор • Resusci Anne</h2>

<!-- режим -->
<div class="card">
  <button onclick="setMode('training')">Обучение</button>
  <button onclick="setMode('exam')">Экзамен</button>
</div>

<!-- сценарии -->
<div class="card">
  <h3>Сценарии</h3>
  <button onclick="selectScenario('primary')">Первичная оценка</button>
  <button onclick="selectScenario('cpr')">СЛР</button>
  <button onclick="selectScenario('aed')">AED</button>
</div>

<!-- статус -->
<div class="card">
  <div class="chip" id="scenarioChip"></div>
  <div class="chip" id="stepChip"></div>
  <div class="chip" id="scoreChip"></div>
</div>

<!-- шаг -->
<div class="card">
  <h2 id="stepTitle"></h2>
  <p id="stepText"></p>

  <button class="voice" onclick="startVoice()">🎤 Говорить</button>

  <button onclick="repeat()">Повтори</button>
  <button onclick="showExplain()">Объясни</button>
  <button class="danger" onclick="showRisks()">Риски</button>

  <button onclick="prev()">Назад</button>
</div>

<!-- ПРОВЕРКА -->
<div class="card">
  <h3>Проверка</h3>
  <p id="question"></p>

  <div id="answers"></div>

  <div id="feedback"></div>
  <div id="explanation" class="hidden"></div>

  <button id="nextBtn" class="primary hidden" onclick="next()">Дальше</button>
</div>

<!-- результат -->
<div id="result" class="card hidden">
  <h2 id="resultText"></h2>
  <p id="level"></p>
  <button onclick="restart()">Заново</button>
</div>

</div>

<script>

const scenarios = {

  primary: [
    {
      step:"Проверь безопасность места",
      explain:"Сначала убедись, что нет угроз",
      risks:"Можно пострадать самому",
      check:{
        q:"Что сделать первым?",
        options:["Проверить безопасность","Начать СЛР","Уйти"],
        correct:["безопасность"]
      }
    }
  ],

  cpr: [
    {
      step:"Проверь сознание",
      explain:"Нужно определить реакцию",
      risks:"Можно потерять время",
      check:{
        q:"С чего начать?",
        options:["Проверить сознание","Делать компрессии"],
        correct:["сознание"]
      }
    },
    {
      step:"Начни компрессии",
      explain:"Дави 5-6 см",
      risks:"Неправильная техника",
      check:{
        q:"Глубина?",
        options:["2 см","5-6 см"],
        correct:["5","6"]
      }
    }
  ],

  aed: [
    {
      step:"Включи AED",
      explain:"Он даст инструкции",
      risks:"Потеря времени",
      check:{
        q:"Первое действие?",
        options:["Включить AED","Ждать"],
        correct:["включить"]
      }
    }
  ]

};

let scenario="primary";
let steps=[];
let step=0;
let score=0;
let mode="training";
let answered=false;

// выбор сценария
function selectScenario(s){
  scenario=s;
  steps=scenarios[s];
  restart();
}

// режим
function setMode(m){
  mode=m;
  restart();
}

// загрузка шага
function load(){
  const s=steps[step];

  document.getElementById("scenarioChip").innerText="Сценарий: "+scenario;
  document.getElementById("stepChip").innerText=`Шаг ${step+1}/${steps.length}`;
  document.getElementById("scoreChip").innerText=`Баллы: ${score}`;

  document.getElementById("stepTitle").innerText="Шаг "+(step+1);
  document.getElementById("stepText").innerText=s.step;

  document.getElementById("question").innerText=s.check.q;

  const answers=document.getElementById("answers");
  answers.innerHTML="";

  s.check.options.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>check(o);
    answers.appendChild(b);
  });

  document.getElementById("feedback").innerText="";
  document.getElementById("explanation").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");

  answered=false;
}

// проверка
function check(ans){
  if(answered) return;
  answered=true;

  const s=steps[step];
  const norm=ans.toLowerCase();

  const correct=s.check.correct.some(c=>norm.includes(c));

  const fb=document.getElementById("feedback");

  if(correct){
    score++;
    fb.innerText="✅ Верно";
    fb.className="correct";
  } else {
    fb.innerText="❌ Неверно";
    fb.className="wrong";
  }

  if(mode==="training"){
    const exp=document.getElementById("explanation");
    exp.innerText=s.explain;
    exp.classList.remove("hidden");
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

// дальше
function next(){
  step++;
  if(step>=steps.length){
    finish();
    return;
  }
  load();
}

// назад
function prev(){
  if(step>0) step--;
  load();
}

// результат
function finish(){
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("resultText").innerText=`${score}/${steps.length}`;

  let lvl="";

  if(score===steps.length) lvl="Профи";
  else if(score>=steps.length/2) lvl="Норм";
  else lvl="Нужно обучение";

  document.getElementById("level").innerText=lvl;
}

// рестарт
function restart(){
  step=0;
  score=0;
  document.getElementById("result").classList.add("hidden");
  load();
}

// объяснение
function showExplain(){
  const s=steps[step];
  alert(s.explain);
}

// повтор
function repeat(){
  const s=steps[step];
  alert(s.step);
}

// риски
function showRisks(){
  const s=steps[step];
  alert(s.risks);
}

// голос
function startVoice(){
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang="ru-RU";

  rec.onresult=e=>{
    const text=e.results[0][0].transcript;
    check(text);
  };

  rec.start();
}

// init
selectScenario("primary");

</script>

</body>
</html>
