<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI First Aid Trainer</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
}

.primary { background: #3b82f6; color: white; }
.success { background: #22c55e; }
.voice { background: #10b981; }
.hidden { display: none; }
</style>
</head>

<body>

<h2>🚑 AI тренажёр первой помощи</h2>

<div class="card">
  <h3 id="question"></h3>

  <button class="voice" onclick="startVoice()">🎤 Говорить</button>

  <button onclick="answer('включить AED')">Включить AED</button>
  <button onclick="answer('убрать AED')">Убрать AED</button>
  <button onclick="answer('ждать')">Ждать</button>

  <div id="feedback"></div>
</div>

<div class="card hidden" id="stepBlock">
  <h3>📘 Правильное действие</h3>
  <p id="stepText"></p>
</div>

<button class="primary" onclick="nextStep()">Дальше</button>

<script>

// 🔥 ВСТАВЬ СЮДА СВОЙ API KEY
const API_KEY = "PASTE_YOUR_KEY_HERE";

const steps = [
  {
    question: "Что нужно сделать первым после того, как AED оказался рядом?",
    correct: "включить AED",
    step: "Нужно включить AED и следовать голосовым инструкциям."
  },
  {
    question: "Какая глубина компрессий?",
    correct: "5-6 см",
    step: "Глубина компрессий должна быть 5–6 см."
  }
];

let currentStep = 0;

function loadStep() {
  document.getElementById("question").innerText = steps[currentStep].question;
  document.getElementById("feedback").innerText = "";
  document.getElementById("stepBlock").classList.add("hidden");
}

async function answer(userAnswer) {
  const step = steps[currentStep];

  const prompt = `
Ты инструктор по первой помощи.

Вопрос: ${step.question}
Правильный ответ: ${step.correct}
Ответ пользователя: ${userAnswer}

Ответь строго в JSON:
{
 "correct": true/false,
 "feedback": "короткое объяснение"
}
`;

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }]
    })
  });

  const data = await res.json();
  const text = data.choices[0].message.content;

  let result;
  try {
    result = JSON.parse(text);
  } catch {
    document.getElementById("feedback").innerText = "Ошибка AI";
    return;
  }

  document.getElementById("feedback").innerText =
    result.correct ? "✅ " + result.feedback : "❌ " + result.feedback;

  // 🔥 ПОСЛЕ ответа показываем шаг
  document.getElementById("stepText").innerText = step.step;
  document.getElementById("stepBlock").classList.remove("hidden");
}

function nextStep() {
  currentStep++;
  if (currentStep >= steps.length) {
    alert("Тренировка завершена");
    currentStep = 0;
  }
  loadStep();
}

// 🎤 Голос
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "ru-RU";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    answer(text);
  };

  recognition.start();
}

// init
loadStep();

</script>

</body>
</html>
