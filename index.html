<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Aid Trainer 4.1</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#05070b;
  color:white;
  padding:20px;
}

.container {
  max-width:700px;
  margin:auto;
}

.card {
  background:#0f1116;
  padding:20px;
  border-radius:20px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:none;
  font-size:16px;
  font-weight:600;
}

.primary { background:#3b82f6; color:white; }
.voice { background:#22c55e; color:black; }
.mode { background:#1f2937; color:white; }

.hidden { display:none; }

.correct { color:#22c55e; font-weight:700; }
.wrong { color:#ef4444; font-weight:700; }
</style>
</head>

<body>

<div class="container">

<h2>🚑 Тренажёр первой помощи</h2>

<!-- ВЫБОР СЦЕНАРИЯ -->
<div id="scenarioScreen" class="card">
  <h3>Выбери сценарий</h3>
  <button onclick="selectScenario('cpr')">🫀 СЛР</button>
  <button onclick="selectScenario('aed')">⚡ AED</button>
  <button onclick="selectScenario('primary')">👀 Первичная оценка</button>
</div>

<!-- ВЫБОР РЕЖИМА -->
<div id="modeScreen" class="card hidden">
  <h3>Режим</h3>
  <button class="mode" onclick="setMode('training')">Обучение</button>
  <button class="mode" onclick="setMode('exam')">Экзамен</button>
</div>

<!-- ТРЕНАЖЕР -->
<div id="trainer" class="card hidden">

  <div id="progress"></div>
  <h3 id="question"></h3>

  <div id="answers"></div>

  <button class="voice" onclick="startVoice()">🎤 Голос</button>

  <div id="feedback"></div>

  <div id="explanation" class="hidden"></div>

  <button class="primary hidden" id="nextBtn" onclick="nextStep()">Дальше</button>

</div>

<!-- РЕЗУЛЬТАТ -->
<div id="result" class="card hidden">
  <h2 id="resultText"></h2>
  <p id="level"></p>
  <button onclick="restart()">Заново</button>
</div>

</div>

<script>

// сценарии
const scenarios = {

  aed: [
    {
      q:"Что сделать первым?",
      options:["Включить AED","Ждать","Убрать AED"],
      correct:["включить"],
      exp:"Сначала нужно включить AED"
    },
    {
      q:"Что делать при анализе?",
      options:["Касаться","Не трогать","Делать СЛР"],
      correct:["не трогать","не касаться"],
      exp:"Нельзя касаться пациента"
    }
  ],

  cpr: [
    {
      q:"С чего начать?",
      options:["Проверить сознание","Делать компрессии","Уйти"],
      correct:["проверить"],
      exp:"Сначала проверяется сознание"
    },
    {
      q:"Глубина компрессий?",
      options:["2 см","5-6 см","10 см"],
      correct:["5","6"],
      exp:"Правильно: 5-6 см"
    }
  ],

  primary: [
    {
      q:"Первое действие?",
      options:["Проверить сознание","Звонить","Уйти"],
      correct:["сознание"],
      exp:"Начинаем с проверки сознания"
    }
  ]

};

let steps = [];
let step = 0;
let score = 0;
let mode = "training";
let answered = false;

// выбор сценария
function selectScenario(name){
  steps = scenarios[name];
  document.getElementById("scenarioScreen").classList.add("hidden");
  document.getElementById("modeScreen").classList.remove("hidden");
}

// выбор режима
function setMode(m){
  mode = m;
  document.getElementById("modeScreen").classList.add("hidden");
  document.getElementById("trainer").classList.remove("hidden");
  loadStep();
}

// загрузка шага
function loadStep(){
  answered = false;

  const s = steps[step];

  document.getElementById("question").innerText = s.q;
  document.getElementById("feedback").innerText="";
  document.getElementById("explanation").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");

  document.getElementById("progress").innerText =
    `Шаг ${step+1}/${steps.length} | Баллы: ${score}`;

  const answers = document.getElementById("answers");
  answers.innerHTML="";

  s.options.forEach(o=>{
    const b=document.createElement("button");
    b.innerText=o;
    b.onclick=()=>check(o);
    answers.appendChild(b);
  });

}

// проверка
function check(ans){
  if(answered) return;
  answered=true;

  const s=steps[step];
  const norm=ans.toLowerCase();

  const correct=s.correct.some(c=>norm.includes(c));

  const fb=document.getElementById("feedback");

  if(correct){
    score++;
    fb.innerText="✅ Верно";
    fb.className="correct";
  } else {
    fb.innerText="❌ Неверно";
    fb.className="wrong";
  }

  if(mode==="training"){
    const exp=document.getElementById("explanation");
    exp.innerText=s.exp;
    exp.classList.remove("hidden");
  }

  document.getElementById("nextBtn").classList.remove("hidden");
}

// дальше
function nextStep(){
  step++;
  if(step>=steps.length){
    showResult();
    return;
  }
  loadStep();
}

// результат
function showResult(){
  document.getElementById("trainer").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("resultText").innerText =
    `${score}/${steps.length}`;

  let lvl="";

  if(score===steps.length) lvl="Профи";
  else if(score>=steps.length/2) lvl="Норм";
  else lvl="Нужно обучение";

  document.getElementById("level").innerText=lvl;
}

// голос
function startVoice(){
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang="ru-RU";

  rec.onresult=e=>{
    const text=e.results[0][0].transcript;
    check(text);
  };

  rec.start();
}

// рестарт
function restart(){
  step=0;
  score=0;
  document.getElementById("result").classList.add("hidden");
  document.getElementById("scenarioScreen").classList.remove("hidden");
}

</script>

</body>
</html>
