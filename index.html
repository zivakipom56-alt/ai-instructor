<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-инструктор 4.0 | Resusci Anne</title>
  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --card-2: #171717;
      --text: #ffffff;
      --muted: #bdbdbd;
      --accent: #6fd39a;
      --accent-2: #4f83f1;
      --warn: #d8a23a;
      --danger: #b84f5b;
      --success: #2e9f5b;
      --border: #262626;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, #0f0f0f 0%, #090909 100%);
      box-shadow: var(--shadow);
    }

    .hero-title {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.12;
      margin-bottom: 8px;
    }

    .hero-subtitle {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 14px;
      margin-top: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(111, 211, 154, 0.7);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .card h2,
    .card h3 {
      margin: 0 0 14px 0;
    }

    .welcome {
      display: none;
      margin-bottom: 18px;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(111, 211, 154, 0.25);
      background: rgba(111, 211, 154, 0.08);
    }

    .welcome.active {
      display: block;
    }

    .welcome-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .welcome-text {
      color: #e8f8ee;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .big-start {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 20px;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #08110d;
    }

    .big-start:hover {
      filter: brightness(1.03);
    }

    .scenario-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .scenario-btn,
    .action-btn,
    .answer-btn,
    .result-btn {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card-2);
      color: var(--text);
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    .scenario-btn:hover,
    .action-btn:hover,
    .answer-btn:hover,
    .result-btn:hover {
      transform: translateY(-1px);
      border-color: #3a3a3a;
      background: #1b1b1b;
    }

    .action-btn:disabled,
    .answer-btn:disabled,
    .result-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .scenario-btn small {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
    }

    .scenario-btn.active {
      border-color: var(--accent-2);
      box-shadow: inset 0 0 0 1px rgba(79, 131, 241, 0.35);
    }

    .step-box {
      margin-top: 16px;
      background: linear-gradient(180deg, #121212 0%, #0d0d0d 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      min-height: 220px;
    }

    .step-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .badge {
      background: #171717;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .step-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .step-text {
      font-size: 20px;
      line-height: 1.55;
      color: #f3f3f3;
    }

    .hint {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(79, 131, 241, 0.1);
      border: 1px solid rgba(79, 131, 241, 0.25);
      color: #e3ecff;
      line-height: 1.5;
    }

    .hint.visible {
      display: block;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn.primary {
      background: var(--accent-2);
      border-color: transparent;
    }

    .action-btn.voice {
      background: var(--accent);
      color: #08110d;
      border-color: transparent;
    }

    .action-btn.warn {
      background: #2d2107;
      border-color: #694b0a;
      color: #ffd98a;
    }

    .action-btn.danger {
      background: #2d1115;
      border-color: #69303a;
      color: #ffc0c7;
    }

    .mini-tools {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tool-note {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--muted);
      line-height: 1.4;
      font-size: 14px;
    }

    .log {
      background: #0b0b0b;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      min-height: 180px;
      max-height: 320px;
      overflow: auto;
      font-size: 14px;
      line-height: 1.5;
      color: #ddd;
    }

    .log-entry {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #232323;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .quiz-box {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(79, 131, 241, 0.25);
      background: rgba(79, 131, 241, 0.08);
    }

    .quiz-box.visible {
      display: block;
    }

    .quiz-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .quiz-question {
      color: #f0f6ff;
      line-height: 1.5;
      margin-bottom: 14px;
      font-size: 18px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn.correct {
      border-color: var(--success);
      background: rgba(46, 159, 91, 0.18);
    }

    .answer-btn.wrong {
      border-color: var(--danger);
      background: rgba(184, 79, 91, 0.18);
    }

    .answer-btn.revealed-correct {
      border-color: var(--success);
      background: rgba(46, 159, 91, 0.1);
    }

    .quiz-feedback {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: 15px;
    }

    .quiz-feedback.visible {
      display: block;
    }

    .quiz-feedback.success {
      background: rgba(46, 159, 91, 0.12);
      border: 1px solid rgba(46, 159, 91, 0.28);
      color: #dff7e8;
    }

    .quiz-feedback.error {
      background: rgba(184, 79, 91, 0.12);
      border: 1px solid rgba(184, 79, 91, 0.28);
      color: #ffe0e5;
    }

    .results-box {
      display: none;
      margin-top: 18px;
      padding: 22px;
      border-radius: 20px;
      border: 1px solid rgba(111, 211, 154, 0.25);
      background: linear-gradient(180deg, rgba(111, 211, 154, 0.1) 0%, rgba(79, 131, 241, 0.06) 100%);
    }

    .results-box.visible {
      display: block;
    }

    .results-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .results-score {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .results-level {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px
