<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-инструктор 3.2 | Resusci Anne</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    h1 {
      font-size: 26px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: #222;
      color: white;
      cursor: pointer;
    }

    .active {
      background: #4f83f1;
    }

    .card {
      background: #111;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .hidden {
      display: none;
    }

    .correct {
      background: #2e9f5b;
    }

    .wrong {
      background: #b84f5b;
    }
  </style>
</head>
<body>

<h1>AI-инструктор 3.2</h1>

<div>
  <button onclick="startScenario('triage')">Первичная оценка</button>
  <button onclick="startScenario('cpr')">СЛР</button>
  <button onclick="startScenario('aed')">AED</button>
</div>

<div class="card">
  <div id="stepTitle">Готов</div>
  <div id="stepText">Выбери сценарий</div>
</div>

<div id="quizBox" class="card hidden">
  <div id="quizQuestion"></div>
  <div id="answers"></div>
</div>

<div id="resultBox" class="card hidden"></div>

<script>
const scenarios = {
  triage: {
    steps: [
      {
        text: "Проверь безопасность места",
        quiz: {
          q: "Что проверяем первым?",
          a: [
            {t:"Пульс", c:false},
            {t:"Безопасность", c:true}
          ]
        }
      },
      {
        text: "Проверь сознание"
      },
      {
        text: "Проверь дыхание",
        quiz: {
          q: "Сколько секунд проверка?",
          a: [
            {t:"5", c:false},
            {t:"10", c:true}
          ]
        }
      }
    ]
  },

  cpr: {
    steps: [
      { text: "Проверь безопасность" },
      { text: "Проверь сознание" },
      {
        text: "Начни СЛР",
        quiz: {
          q: "Глубина компрессий?",
          a: [
            {t:"2 см", c:false},
            {t:"5-6 см", c:true}
          ]
        }
      }
    ]
  },

  aed: {
    steps: [
      { text: "Включи AED" },
      { text: "Наклей электроды" },
      {
        text: "Разряд",
        quiz: {
          q: "Можно касаться?",
          a: [
            {t:"Да", c:false},
            {t:"Нет", c:true}
          ]
        }
      }
    ]
  }
};

let current = null;
let stepIndex = 0;
let correct = 0;
let total = 0;

function startScenario(key) {
  current = scenarios[key];
  stepIndex = 0;
  correct = 0;
  total = 0;
  document.getElementById("resultBox").classList.add("hidden");
  showStep();
}

function showStep() {
  const step = current.steps[stepIndex];

  document.getElementById("stepTitle").innerText = "Шаг " + (stepIndex+1);
  document.getElementById("stepText").innerText = step.text;

  if (step.quiz) {
    showQuiz(step.quiz);
  } else {
    document.getElementById("quizBox").classList.add("hidden");
  }
}

function showQuiz(q) {
  document.getElementById("quizBox").classList.remove("hidden");
  document.getElementById("quizQuestion").innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.a.forEach(ans => {
    const btn = document.createElement("button");
    btn.innerText = ans.t;

    btn.onclick = () => {
      total++;
      if (ans.c) {
        correct++;
        btn.classList.add("correct");
      } else {
        btn.classList.add("wrong");
      }
    };

    answers.appendChild(btn);
  });
}

function next() {
  if (!current) return;

  if (stepIndex < current.steps.length - 1) {
    stepIndex++;
    showStep();
  } else {
    finish();
  }
}

function finish() {
  document.getElementById("quizBox").classList.add("hidden");

  const box = document.getElementById("resultBox");
  box.classList.remove("hidden");

  box.innerText = "Результат: " + correct + "/" + total;
}
</script>

<button onclick="next()">Дальше</button>

</body>
</html>
