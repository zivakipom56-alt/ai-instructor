<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HUD-инструктор | XREAL</title>
<style>
:root{
  --bg:#030303;
  --panel:rgba(10,10,10,.78);
  --panel2:rgba(20,20,20,.9);
  --text:#fff;
  --muted:#b8b8b8;
  --green:#6fd39a;
  --blue:#4f83f1;
  --red:#b84f5b;
  --yellow:#d8a23a;
  --border:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 82% 48%, rgba(255,255,255,.05), transparent 18%),
    radial-gradient(circle at 28% 30%, rgba(79,131,241,.12), transparent 22%),
    #030303;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
.hud{
  position:relative;
  width:100vw;
  height:100vh;
}
.panel{
  position:absolute;
  left:24px;
  top:24px;
  width:38vw;
  min-width:390px;
  max-width:560px;
  padding:22px;
  border-radius:28px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 70px rgba(0,0,0,.5);
}
.panel.right{
  left:auto;
  right:24px;
}
.top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 11px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}
.dot{
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 14px rgba(111,211,154,.8);
}
.scenario{
  font-size:18px;
  color:var(--muted);
  font-weight:800;
  margin-bottom:6px;
}
.title{
  font-size:42px;
  line-height:1.05;
  font-weight:950;
  margin-bottom:14px;
}
.text{
  font-size:29px;
  line-height:1.22;
  font-weight:780;
  margin-bottom:14px;
}
.hint{
  display:none;
  margin-top:14px;
  padding:15px;
  border-radius:20px;
  font-size:22px;
  line-height:1.3;
  white-space:pre-line;
}
.hint.show{display:block}
.hint.info{background:rgba(79,131,241,.14);border:1px solid rgba(79,131,241,.35);color:#e4ecff}
.hint.ok{background:rgba(46,159,91,.16);border:1px solid rgba(46,159,91,.38);color:#dff7e8}
.hint.bad{background:rgba(184,79,91,.16);border:1px solid rgba(184,79,91,.38);color:#ffe0e5}
.hint.warn{background:rgba(216,162,58,.16);border:1px solid rgba(216,162,58,.38);color:#ffe9bc}
.progressText{
  display:flex;
  justify-content:space-between;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  margin-top:18px;
  margin-bottom:8px;
}
.bar{
  height:10px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.1);
}
.fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  transition:.25s;
}
.quiz{
  display:none;
  margin-top:16px;
  padding:14px;
  border-radius:22px;
  background:rgba(79,131,241,.11);
  border:1px solid rgba(79,131,241,.3);
}
.quiz.show{display:block}
.question{
  font-size:24px;
  line-height:1.25;
  font-weight:900;
  margin-bottom:12px;
}
.answers{
  display:grid;
  gap:10px;
}
.answer{
  border:1px solid var(--border);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:17px;
  padding:15px;
  font-size:21px;
  font-weight:850;
  text-align:left;
}
.answer.correct{background:rgba(46,159,91,.25);border-color:rgba(46,159,91,.7)}
.answer.wrong{background:rgba(184,79,91,.25);border-color:rgba(184,79,91,.7)}
.answer:disabled{opacity:.9}
.controls{
  position:absolute;
  left:24px;
  bottom:24px;
  width:38vw;
  min-width:390px;
  max-width:560px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
}
.controls.right{
  left:auto;
  right:24px;
}
.btn{
  border:1px solid var(--border);
  background:var(--panel2);
  color:#fff;
  border-radius:17px;
  padding:13px 8px;
  font-size:15px;
  font-weight:900;
}
.btn.primary{background:var(--blue);border-color:transparent}
.btn.voice{background:var(--green);color:#07110c;border-color:transparent}
.start{
  position:absolute;
  inset:0;
  z-index:9;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.86);
  padding:22px;
}
.startCard{
  width:min(620px,90vw);
  padding:28px;
  border-radius:30px;
  background:var(--panel2);
  border:1px solid var(--border);
  text-align:center;
}
.startTitle{
  font-size:42px;
  font-weight:950;
  margin-bottom:10px;
}
.startText{
  color:var(--muted);
  font-size:20px;
  line-height:1.35;
  margin-bottom:16px;
}
.scenarioBtn{
  width:100%;
  border:1px solid var(--border);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:20px;
  padding:18px;
  margin-top:10px;
  font-size:23px;
  font-weight:950;
}
.result{
  display:none;
  margin-top:16px;
  padding:16px;
  border-radius:22px;
  background:rgba(111,211,154,.14);
  border:1px solid rgba(111,211,154,.35);
  font-size:23px;
  line-height:1.35;
  white-space:pre-line;
}
.result.show{display:block}
.clearZone{
  position:absolute;
  right:34px;
  top:34px;
  width:48vw;
  height:calc(100vh - 68px);
  border-radius:30px;
  border:1px dashed rgba(255,255,255,.08);
  color:rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:28px;
  font-weight:950;
  pointer-events:none;
}
@media(max-width:800px){
  body{overflow:auto;height:auto}
  .hud{height:auto;min-height:100vh;padding:12px}
  .panel,.panel.right,.controls,.controls.right{
    position:static;
    width:100%;
    min-width:0;
    max-width:none;
    margin-bottom:12px;
  }
  .clearZone{display:none}
  .controls{grid-template-columns:repeat(2,1fr)}
  .title{font-size:34px}
  .text{font-size:23px}
}
</style>
</head>
<body>
<div class="hud">
  <div class="clearZone">ОСНОВНОЙ ОБЗОР<br>МАНЕКЕН / РУКИ</div>

  <div class="start" id="start">
    <div class="startCard">
      <div class="startTitle">HUD-инструктор</div>
      <div class="startText">Режим под XREAL Beam Pro: маленькое окно сбоку, крупная подсказка, минимум интерфейса.</div>
      <button class="scenarioBtn" onclick="startScenario('triage')">Первичная оценка</button>
      <button class="scenarioBtn" onclick="startScenario('cpr')">СЛР</button>
      <button class="scenarioBtn" onclick="startScenario('aed')">AED</button>
    </div>
  </div>

  <main class="panel" id="panel">
    <div class="top">
      <div class="badge"><span class="dot"></span> HUD</div>
      <div class="badge" id="score">0 / 0</div>
    </div>

    <div class="scenario" id="scenarioName">Сценарий не выбран</div>
    <div class="title" id="stepTitle">Готов</div>
    <div class="text" id="stepText">Выбери сценарий.</div>

    <div class="hint" id="hint"></div>

    <div class="quiz" id="quiz">
      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
    </div>

    <div class="result" id="result"></div>

    <div class="progressText">
      <span id="counter">Шаг —</span>
      <span id="percent">0%</span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </main>

  <div class="controls" id="controls">
    <button class="btn voice" onclick="listen()">🎤 Голос</button>
    <button class="btn primary" onclick="nextStep()">Дальше</button>
    <button class="btn" onclick="explain()">Объясни</button>
    <button class="btn" onclick="toggleSide()">↔ Сторона</button>
  </div>
</div>

<script>
const scenarios={
  triage:{
    name:"Первичная оценка",
    intro:"Запускаю первичную оценку.",
    steps:[
      {
        title:"Шаг 1",
        text:"Осмотрись. Оцени безопасность.",
        explain:"Перед началом помощи убедись, что тебе и пострадавшему ничего не угрожает.",
        quiz:{
          question:"Что проверяем первым?",
          answers:[
            {text:"Пульс",correct:false},
            {text:"Безопасность места",correct:true},
            {text:"Документы",correct:false}
          ],
          ok:"Верно. Сначала безопасность.",
          bad:"Неверно. Первым делом безопасность."
        }
      },
      {
        title:"Шаг 2",
        text:"Проверь сознание.",
        explain:"Аккуратно потряси за плечи и громко спроси: «Вы меня слышите?»"
      },
      {
        title:"Шаг 3",
        text:"Оцени дыхание.",
        explain:"Оцени дыхание быстро. Учебный ориентир — 10 секунд.",
        timer:true,
        quiz:{
          question:"Сколько секунд проверяем дыхание?",
          answers:[
            {text:"5 секунд",correct:false},
            {text:"10 секунд",correct:true},
            {text:"30 секунд",correct:false}
          ],
          ok:"Верно. Ориентир — 10 секунд.",
          bad:"Неверно. Ориентир — 10 секунд."
        }
      },
      {
        title:"Шаг 4",
        text:"Определи дальнейшие действия.",
        explain:"Если не дышит — переход к СЛР. Если дышит — вызов помощи и контроль состояния.",
        quiz:{
          question:"Если без сознания, но дышит?",
          answers:[
            {text:"Начать СЛР",correct:false},
            {text:"Вызвать помощь и контролировать",correct:true},
            {text:"Ничего не делать",correct:false}
          ],
          ok:"Верно. Вызвать помощь и контролировать.",
          bad:"Неверно. Нужно вызвать помощь и контролировать."
        }
      }
    ]
  },
  cpr:{
    name:"СЛР",
    intro:"Запускаю сценарий СЛР.",
    steps:[
      {title:"Шаг 1",text:"Проверь безопасность.",explain:"Помощь начинается только если место безопасно."},
      {title:"Шаг 2",text:"Проверь сознание.",explain:"Обратись громко и проверь реакцию."},
      {
        title:"Шаг 3",
        text:"Оцени дыхание.",
        explain:"Оценка дыхания проводится быстро, примерно 10 секунд.",
        quiz:{
          question:"Сколько времени на оценку дыхания?",
          answers:[
            {text:"3 секунды",correct:false},
            {text:"10 секунд",correct:true},
            {text:"1 минута",correct:false}
          ],
          ok:"Верно. Примерно 10 секунд.",
          bad:"Неверно. Ориентир — 10 секунд."
        }
      },
      {title:"Шаг 4",text:"Вызови помощь. Попроси AED.",explain:"Чем раньше вызвана помощь и принесён AED, тем выше шанс на успешную реанимацию."},
      {
        title:"Шаг 5",
        text:"Начинай СЛР.",
        explain:"Если нет сознания и нормального дыхания — начинай компрессии.",
        quiz:{
          question:"Что делать, если не дышит нормально?",
          answers:[
            {text:"Ждать",correct:false},
            {text:"Начать СЛР",correct:true},
            {text:"Положить на бок",correct:false}
          ],
          ok:"Верно. Нужно начать СЛР.",
          bad:"Неверно. Нужно начать СЛР."
        }
      },
      {
        title:"Шаг 6",
        text:"Компрессии: 5–6 см, 100–120/мин.",
        explain:"Нажимай ритмично, глубоко, с полным расправлением грудной клетки.",
        metronome:true,
        quiz:{
          question:"Глубина компрессий?",
          answers:[
            {text:"2–3 см",correct:false},
            {text:"5–6 см",correct:true},
            {text:"8–10 см",correct:false}
          ],
          ok:"Верно. Глубина 5–6 сантиметров.",
          bad:"Неверно. Ориентир — 5–6 сантиметров."
        }
      },
      {title:"Шаг 7",text:"Продолжай до помощи или AED.",explain:"Не прекращай СЛР без причины."}
    ]
  },
  aed:{
    name:"AED",
    intro:"Запускаю сценарий AED.",
    steps:[
      {
        title:"Шаг 1",
        text:"Включи AED.",
        explain:"После включения AED начнёт давать голосовые подсказки.",
        quiz:{
          question:"Что сделать первым с AED?",
          answers:[
            {text:"Включить",correct:true},
            {text:"Убрать в сторону",correct:false},
            {text:"Ждать",correct:false}
          ],
          ok:"Верно. Сначала включить AED.",
          bad:"Неверно. Сначала включить AED."
        }
      },
      {title:"Шаг 2",text:"Открой грудную клетку.",explain:"Электроды должны быть наклеены на открытую кожу."},
      {title:"Шаг 3",text:"Наклей электроды по схеме.",explain:"Один электрод — справа вверху, второй — слева сбоку ниже."},
      {
        title:"Шаг 4",
        text:"Не касайся во время анализа.",
        explain:"Во время анализа AED никто не должен касаться пострадавшего.",
        quiz:{
          question:"Можно касаться во время анализа?",
          answers:[
            {text:"Да",correct:false},
            {text:"Нет",correct:true}
          ],
          ok:"Верно. Касаться нельзя.",
          bad:"Неверно. Касаться нельзя."
        }
      },
      {title:"Шаг 5",text:"Если нужен разряд — предупреди.",explain:"Убедись, что никто не касается пострадавшего, и нажми кнопку."},
      {
        title:"Шаг 6",
        text:"После разряда продолжи СЛР.",
        explain:"Пауза после разряда снижает эффективность помощи.",
        quiz:{
          question:"Что делать после разряда?",
          answers:[
            {text:"Ждать",correct:false},
            {text:"Продолжить СЛР",correct:true}
          ],
          ok:"Верно. Продолжить СЛР.",
          bad:"Неверно. Нужно продолжить СЛР."
        }
      }
    ]
  }
};

let key=null;
let index=0;
let correct=0;
let total=0;
let answered=false;
let audio=false;
let last="";
let timer=null;
let metronome=null;
let right=false;

const el={
  start:document.getElementById("start"),
  panel:document.getElementById("panel"),
  controls:document.getElementById("controls"),
  scenario:document.getElementById("scenarioName"),
  title:document.getElementById("stepTitle"),
  text:document.getElementById("stepText"),
  hint:document.getElementById("hint"),
  quiz:document.getElementById("quiz"),
  question:document.getElementById("question"),
  answers:document.getElementById("answers"),
  result:document.getElementById("result"),
  fill:document.getElementById("fill"),
  percent:document.getElementById("percent"),
  counter:document.getElementById("counter"),
  score:document.getElementById("score")
};

function primeAudio(){
  if(audio)return;
  audio=true;
  const m=new SpeechSynthesisUtterance("Звук включён");
  m.lang="ru-RU";
  m.volume=.01;
  speechSynthesis.speak(m);
}
function speak(t){
  last=t;
  if(!audio)return;
  speechSynthesis.cancel();
  const m=new SpeechSynthesisUtterance(t);
  m.lang="ru-RU";
  m.rate=.95;
  speechSynthesis.speak(m);
}
function hint(t,type="info"){
  el.hint.textContent=t||"";
  el.hint.className=t?`hint show ${type}`:"hint";
}
function startScenario(k){
  primeAudio();
  key=k;
  index=0;
  correct=0;
  total=0;
  answered=false;
  el.start.style.display="none";
  el.result.classList.remove("show");
  speak(scenarios[k].intro);
  render();
}
function step(){
  return scenarios[key].steps[index];
}
function render(){
  stopTimer();
  stopMetronome();
  hint("");
  el.result.classList.remove("show");
  answered=false;

  const s=scenarios[key];
  const st=step();

  el.scenario.textContent=s.name;
  el.title.textContent=st.title;
  el.text.textContent=st.text;
  el.score.textContent=`${correct} / ${total}`;

  const p=Math.round(((index+1)/s.steps.length)*100);
  el.fill.style.width=p+"%";
  el.percent.textContent=p+"%";
  el.counter.textContent=`Шаг ${index+1} / ${s.steps.length}`;

  if(st.quiz) showQuiz(st.quiz);
  else hideQuiz();

  if(st.timer) startBreathingTimer();
  if(st.metronome) startMetronome();

  speak(`${st.title}. ${st.text}`);
}
function showQuiz(q){
  el.quiz.classList.add("show");
  el.question.textContent=q.question;
  el.answers.innerHTML="";
  q.answers.forEach(a=>{
    const b=document.createElement("button");
    b.className="answer";
    b.textContent=a.text;
    b.onclick=()=>answer(a,q,b);
    el.answers.appendChild(b);
  });
}
function hideQuiz(){
  el.quiz.classList.remove("show");
  el.answers.innerHTML="";
}
function answer(a,q,b){
  if(answered)return;
  answered=true;
  total++;
  const buttons=el.answers.querySelectorAll(".answer");
  buttons.forEach((btn,i)=>{
    btn.disabled=true;
    if(q.answers[i].correct)btn.classList.add("correct");
  });
  if(a.correct){
    correct++;
    b.classList.add("correct");
    hint(q.ok+"\n\n"+(step().explain||""),"ok");
    speak(q.ok);
  }else{
    b.classList.add("wrong");
    hint(q.bad+"\n\n"+(step().explain||""),"bad");
    speak(q.bad);
  }
  el.score.textContent=`${correct} / ${total}`;
}
function nextStep(){
  if(!key)return;
  if(step().quiz&&!answered){
    hint("Сначала ответь на вопрос.","warn");
    speak("Сначала ответь на вопрос.");
    return;
  }
  if(index<scenarios[key].steps.length-1){
    index++;
    render();
  }else finish();
}
function explain(){
  if(!key)return;
  hint(step().explain||"Нет дополнительного объяснения.","info");
  speak(step().explain||"Нет дополнительного объяснения.");
}
function finish(){
  stopTimer();
  stopMetronome();
  hideQuiz();
  const percent=total?Math.round(correct/total*100):0;
  let lvl="Базовый уровень";
  if(percent>=85)lvl="Отличный уровень";
  else if(percent>=60)lvl="Хороший уровень";
  el.result.textContent=`Сценарий завершён.\nРезультат: ${correct} / ${total} (${percent}%).\nУровень: ${lvl}.`;
  el.result.classList.add("show");
  hint("Готово.","ok");
  speak(`Сценарий завершён. Результат ${correct} из ${total}.`);
}
function startBreathingTimer(){
  let sec=10;
  hint(`Таймер дыхания: ${sec} секунд`,"warn");
  timer=setInterval(()=>{
    sec--;
    hint(`Таймер дыхания: ${sec} секунд`,"warn");
    if(sec<=0){
      stopTimer();
      hint("Оценка дыхания завершена.","ok");
      speak("Оценка дыхания завершена.");
    }
  },1000);
}
function stopTimer(){
  if(timer){clearInterval(timer);timer=null;}
}
function startMetronome(){
  let c=0;
  hint("Метроном СЛР включён. Держи ритм 100–120 в минуту.","warn");
  metronome=setInterval(()=>{
    c++;
    if(c%10===0)hint(`Метроном: ${c} нажатий`,"warn");
  },600);
}
function stopMetronome(){
  if(metronome){clearInterval(metronome);metronome=null;}
}
function toggleSide(){
  right=!right;
  el.panel.classList.toggle("right",right);
  el.controls.classList.toggle("right",right);
}
function listen(){
  primeAudio();
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    hint("Голос не поддерживается этим браузером.","bad");
    return;
  }
  const r=new SR();
  r.lang="ru-RU";
  r.interimResults=false;
  r.maxAlternatives=1;
  hint("Слушаю...","info");
  r.start();
  r.onresult=e=>{
    const t=e.results[0][0].transcript.trim().toLowerCase();
    voice(t);
  };
  r.onerror=()=>hint("Не удалось распознать голос.","bad");
}
function voice(t){
  if(t.includes("первичная"))return startScenario("triage");
  if(t.includes("слр")||t.includes("с л р"))return startScenario("cpr");
  if(t.includes("aed")||t.includes("аед"))return startScenario("aed");
  if(t.includes("дальше"))return nextStep();
  if(t.includes("объясни"))return explain();
  if(t.includes("повтори"))return speak(last||"Пока нечего повторять.");
  if(t.includes("не дышит")){
    hint("Принято: не дышит. Следующий сценарий — СЛР.","warn");
    return speak("Принято. Не дышит. Следующий сценарий — СЛР.");
  }
  if(t.includes("дышит")){
    hint("Принято: дыхание есть. Вызови помощь и контролируй состояние.","ok");
    return speak("Принято. Дыхание есть.");
  }
  hint("Команда не распознана.","warn");
  speak("Команда не распознана.");
}
const params=new URLSearchParams(location.search);
const scenario=params.get("scenario");
const pos=params.get("pos");
if(pos==="right")toggleSide();
if(scenario&&scenarios[scenario])startScenario(scenario);
</script>
