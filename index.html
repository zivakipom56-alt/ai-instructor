<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Экзамен СЛР XR | XREAL HUD</title>
<style>
:root{
  --panel:rgba(10,10,10,.84);
  --panel2:rgba(20,20,20,.95);
  --text:#fff;
  --muted:#b8b8b8;
  --green:#6fd39a;
  --blue:#4f83f1;
  --red:#b84f5b;
  --yellow:#d8a23a;
  --border:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 78% 44%, rgba(255,255,255,.05), transparent 20%),
    radial-gradient(circle at 23% 30%, rgba(79,131,241,.12), transparent 23%),
    #030303;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
.hud{position:relative;width:100vw;height:100vh}
.visualZone{
  position:absolute;
  right:34px;
  top:34px;
  width:48vw;
  height:calc(100vh - 68px);
  border-radius:30px;
  border:1px dashed rgba(255,255,255,.08);
  color:rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  pointer-events:none;
  overflow:hidden;
}
.visualPlaceholder{
  font-size:28px;
  font-weight:950;
  line-height:1.25;
}
.visualCard{
  display:none;
  width:360px;
  min-height:260px;
  border-radius:34px;
  background:rgba(10,10,10,.58);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(16px);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:18px;
  padding:24px;
  box-shadow:0 18px 70px rgba(0,0,0,.35);
}
.visualCard.show{display:flex;animation:visualIn .35s ease-out}
.visualIcon{font-size:88px;line-height:1}
.visualText{color:#fff;font-size:25px;font-weight:900}
.scan{
  width:130px;height:130px;border-radius:50%;
  border:4px solid rgba(111,211,154,.3);
  position:relative;
}
.scan:after{
  content:"";
  position:absolute;
  inset:12px;
  border-radius:50%;
  border-top:5px solid var(--green);
  animation:spin 1.1s linear infinite;
}
.breathe{
  width:150px;height:105px;border-radius:80px 80px 44px 44px;
  background:rgba(79,131,241,.18);
  border:4px solid rgba(79,131,241,.55);
  animation:breathe 1.4s ease-in-out infinite;
}
.pulse{
  width:170px;height:90px;
  position:relative;
}
.pulse:before{
  content:"";
  position:absolute;
  left:0;right:0;top:42px;
  height:6px;
  background:linear-gradient(90deg, transparent, var(--green), transparent);
  box-shadow:0 0 18px rgba(111,211,154,.8);
  animation:pulseLine 1s ease-in-out infinite;
}
.hand{
  width:140px;height:140px;border-radius:24px;
  border:4px solid rgba(255,255,255,.24);
  position:relative;
}
.hand:before{
  content:"";
  position:absolute;
  left:42px;top:32px;
  width:56px;height:76px;border-radius:20px;
  background:rgba(111,211,154,.35);
  animation:press .7s ease-in-out infinite;
}
.phone{
  width:90px;height:150px;border-radius:24px;
  border:5px solid rgba(79,131,241,.7);
  position:relative;
  animation:ring 1s ease-in-out infinite;
}
.phone:after{
  content:"112";
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:28px;
  font-weight:950;
}
.recovery{width:190px;height:90px;position:relative}
.recovery:before{
  content:"";
  position:absolute;
  left:20px;top:30px;
  width:150px;height:28px;border-radius:40px;
  background:rgba(111,211,154,.45);
  transform:rotate(-12deg);
}
.recovery:after{
  content:"";
  position:absolute;
  left:140px;top:8px;
  width:42px;height:42px;border-radius:50%;
  background:rgba(111,211,154,.55);
}
.panel{
  position:absolute;
  left:24px;
  top:24px;
  width:39vw;
  min-width:400px;
  max-width:590px;
  padding:22px;
  border-radius:28px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 70px rgba(0,0,0,.5);
}
.panel.right{left:auto;right:24px}
.controls.right{left:auto;right:24px}
.top{display:flex;justify-content:space-between;gap:10px;margin-bottom:14px}
.badge{
  display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;
  background:rgba(255,255,255,.08);border:1px solid var(--border);
  color:var(--muted);font-size:13px;font-weight:850
}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 14px rgba(111,211,154,.8)}
.phase{font-size:17px;color:var(--muted);font-weight:850;margin-bottom:7px}
.title{font-size:39px;line-height:1.05;font-weight:950;margin-bottom:14px}
.text{font-size:28px;line-height:1.22;font-weight:780;margin-bottom:14px}
.voiceTip{margin-top:10px;color:var(--muted);font-size:14px;font-weight:800}
.hint{
  display:none;margin-top:14px;padding:15px;border-radius:20px;
  font-size:21px;line-height:1.3;white-space:pre-line
}
.hint.show{display:block}
.info{background:rgba(79,131,241,.14);border:1px solid rgba(79,131,241,.35);color:#e4ecff}
.ok{background:rgba(46,159,91,.16);border:1px solid rgba(46,159,91,.38);color:#dff7e8}
.bad{background:rgba(184,79,91,.16);border:1px solid rgba(184,79,91,.38);color:#ffe0e5}
.warn{background:rgba(216,162,58,.16);border:1px solid rgba(216,162,58,.38);color:#ffe9bc}
.quiz{
  display:none;margin-top:16px;padding:14px;border-radius:22px;
  background:rgba(79,131,241,.11);border:1px solid rgba(79,131,241,.3)
}
.quiz.show{display:block}
.question{font-size:23px;line-height:1.25;font-weight:900;margin-bottom:12px}
.answers{display:grid;gap:10px}
.answer{
  border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;
  border-radius:17px;padding:15px;font-size:20px;font-weight:850;text-align:left
}
.answer.correct{background:rgba(46,159,91,.25);border-color:rgba(46,159,91,.7)}
.answer.wrong{background:rgba(184,79,91,.25);border-color:rgba(184,79,91,.7)}
.answer:disabled{opacity:.9}
.progressText{
  display:flex;justify-content:space-between;color:var(--muted);
  font-size:13px;font-weight:850;margin-top:18px;margin-bottom:8px
}
.bar{height:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.1)}
.fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--blue));transition:.25s}
.controls{
  position:absolute;left:24px;bottom:24px;width:39vw;min-width:400px;max-width:590px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:9px
}
.btn{
  border:1px solid var(--border);background:var(--panel2);color:#fff;border-radius:17px;
  padding:13px 8px;font-size:15px;font-weight:900
}
.btn.primary{background:var(--blue);border-color:transparent}
.btn.voice{background:var(--green);color:#07110c;border-color:transparent}
.start{
  position:absolute;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);padding:22px
}
.startCard{
  width:min(720px,90vw);padding:28px;border-radius:30px;background:var(--panel2);
  border:1px solid var(--border);text-align:center
}
.startTitle{font-size:40px;font-weight:950;margin-bottom:10px}
.startText{color:var(--muted);font-size:20px;line-height:1.35;margin-bottom:18px}
.startBtn{
  width:100%;border:1px solid var(--border);background:var(--green);color:#07110c;
  border-radius:22px;padding:18px;font-size:24px;font-weight:950
}
.result{
  display:none;margin-top:16px;padding:16px;border-radius:22px;
  background:rgba(111,211,154,.14);border:1px solid rgba(111,211,154,.35);
  font-size:22px;line-height:1.35;white-space:pre-line
}
.result.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{transform:scale(.88)}50%{transform:scale(1.08)}}
@keyframes pulseLine{0%,100%{transform:scaleX(.65);opacity:.55}50%{transform:scaleX(1);opacity:1}}
@keyframes press{0%,100%{transform:translateY(0)}50%{transform:translateY(20px)}}
@keyframes ring{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes visualIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:800px){
  body{overflow:auto;height:auto}
  .hud{height:auto;min-height:100vh;padding:12px}
  .panel,.panel.right,.controls,.controls.right{
    position:static;width:100%;min-width:0;max-width:none;margin-bottom:12px
  }
  .visualZone{display:none}
  .controls{grid-template-columns:repeat(2,1fr)}
  .title{font-size:34px}
  .text{font-size:23px}
}
</style>
</head>

<body>
<div class="hud">
  <div class="visualZone" id="visualZone">
    <div class="visualPlaceholder" id="visualPlaceholder">ОСНОВНОЙ ОБЗОР<br>МАНЕКЕН / РУКИ</div>
    <div class="visualCard" id="visualCard">
      <div id="visualGraphic"></div>
      <div class="visualText" id="visualText"></div>
    </div>
  </div>

  <div class="start" id="start">
    <div class="startCard">
      <div class="startTitle">Экзамен СЛР XR</div>
      <div class="startText">
        Hands-free режим: выполняй действие, говори «выполнено», затем отвечай голосом.
      </div>
      <button class="startBtn" onclick="startExam()">Начать экзамен</button>
    </div>
  </div>

  <main class="panel" id="panel">
    <div class="top">
      <div class="badge"><span class="dot"></span> CPR EXAM</div>
      <div class="badge" id="score">0 / 0</div>
    </div>

    <div class="phase" id="phase">Ожидание</div>
    <div class="title" id="title">Готов</div>
    <div class="text" id="text">Нажми «Начать экзамен».</div>
    <div class="voiceTip" id="voiceTip">Голос: «начать экзамен»</div>

    <div class="hint" id="hint"></div>

    <div class="quiz" id="quiz">
      <div class="question" id="question"></div>
      <div class="answers" id="answers"></div>
    </div>

    <div class="result" id="result"></div>

    <div class="progressText">
      <span id="counter">Шаг —</span>
      <span id="percent">0%</span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </main>

  <div class="controls" id="controls">
    <button class="btn voice" onclick="listen()">🎤 Голос</button>
    <button class="btn primary" onclick="next()">Выполнено</button>
    <button class="btn" onclick="explain()">Объясни</button>
    <button class="btn" onclick="toggleSide()">↔ Сторона</button>
  </div>
</div>

let stepIndex = 0;
let phase = "action";
let correct = 0;
let total = 0;
let answered = false;
let started = false;
let audioReady = false;
let lastText = "";
let right = false;
let recognition = null;

const el = {
  start: document.getElementById("start"),
  panel: document.getElementById("panel"),
  controls: document.getElementById("controls"),
  phase: document.getElementById("phase"),
  title: document.getElementById("title"),
  text: document.getElementById("text"),
  voiceTip: document.getElementById("voiceTip"),
  hint: document.getElementById("hint"),
  quiz: document.getElementById("quiz"),
  question: document.getElementById("question"),
  answers: document.getElementById("answers"),
  result: document.getElementById("result"),
  fill: document.getElementById("fill"),
  percent: document.getElementById("percent"),
  counter: document.getElementById("counter"),
  score: document.getElementById("score"),
  visualPlaceholder: document.getElementById("visualPlaceholder"),
  visualCard: document.getElementById("visualCard"),
  visualGraphic: document.getElementById("visualGraphic"),
  visualText: document.getElementById("visualText")
};

function primeAudio(){
  if(audioReady) return;
  audioReady = true;
  const msg = new SpeechSynthesisUtterance("Звук включён");
  msg.lang = "ru-RU";
  msg.volume = 0.01;
  speechSynthesis.speak(msg);
}

function speak(text){
  lastText = text;
  if(!audioReady) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ru-RU";
  msg.rate = 0.95;
  speechSynthesis.speak(msg);
}

function setHint(text, type="info"){
  el.hint.textContent = text || "";
  el.hint.className = text ? `hint show ${type}` : "hint";
}

function currentStep(){
  return examSteps[stepIndex];
}

function startExam(){
  primeAudio();
  started = true;
  stepIndex = 0;
  phase = "action";
  correct = 0;
  total = 0;
  answered = false;
  el.start.style.display = "none";
  el.result.classList.remove("show");
  hideVisual();
  render();
}

function render(){
  setHint("");
  hideQuiz();
  hideVisual();
  answered = false;
  el.result.classList.remove("show");

  const step = currentStep();
  updateProgress();

  if(phase === "action"){
    el.phase.textContent = "Этап: действие";
    el.title.textContent = step.actionTitle;
    el.text.textContent = step.actionText;
    el.voiceTip.textContent = "Голос: «выполнено»";
    speak(`${step.actionTitle}. ${step.actionText}. После выполнения скажи: выполнено.`);
  }

  if(phase === "question"){
    el.phase.textContent = "Этап: вопрос";
    el.title.textContent = "Проверка";
    el.text.textContent = "Ответь голосом.";
    el.voiceTip.textContent = "Можно назвать вариант или полный ответ";
    showQuiz(step);
    speak(`Вопрос. ${step.question}. Ответь голосом.`);
  }
}

function updateProgress(){
  const progress = Math.round(((stepIndex + 1) / examSteps.length) * 100);
  el.fill.style.width = progress + "%";
  el.percent.textContent = progress + "%";
  el.counter.textContent = `Шаг ${stepIndex + 1} / ${examSteps.length}`;
  el.score.textContent = `${correct} / ${total}`;
}

function showQuiz(step){
  el.quiz.classList.add("show");
  el.question.textContent = step.question;
  el.answers.innerHTML = "";

  step.answers.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.textContent = `${index + 1}. ${answer.text}`;
    btn.onclick = () => answerQuestion(index);
    el.answers.appendChild(btn);
  });
}

function hideQuiz(){
  el.quiz.classList.remove("show");
  el.question.textContent = "";
  el.answers.innerHTML = "";
}

function answerQuestion(answerIndex){
  if(answered) return;

  const step = currentStep();
  const answer = step.answers[answerIndex];
  if(!answer) return;

  answered = true;
  total++;

  const buttons = el.answers.querySelectorAll(".answer");

  buttons.forEach((btn, index) => {
    btn.disabled = true;
    if(step.answers[index].correct){
      btn.classList.add("correct");
    }
  });

  if(answer.correct){
    correct++;
    buttons[answerIndex].classList.add("correct");
    setHint(`${step.correctText}\n\nОбъяснение: ${step.explanation}`, "ok");
    showVisual(step.visual || "ok", step.correctText);
    speak(`${step.correctText}. ${step.explanation}`);
  }else{
    buttons[answerIndex].classList.add("wrong");
    setHint(`${step.wrongText}\n\nОбъяснение: ${step.explanation}`, "bad");
    showVisual("error", "Ошибка");
    speak(`${step.wrongText}. ${step.explanation}`);
  }

  el.voiceTip.textContent = "Голос: «выполнено» для следующего шага";
  updateProgress();
}

function next(){
  if(!started) return;

  if(phase === "action"){
    phase = "question";
    render();
    return;
  }

  if(phase === "question"){
    if(!answered){
      setHint("Сначала ответь на вопрос.", "warn");
      speak("Сначала ответь на вопрос.");
      return;
    }

    if(stepIndex < examSteps.length - 1){
      stepIndex++;
      phase = "action";
      render();
    }else{
      finish();
    }
  }
}

function explain(){
  if(!started) return;

  const step = currentStep();

  if(phase === "action"){
    setHint("В режиме экзамена объяснение появится после ответа. Выполни действие и скажи «выполнено».", "warn");
    speak("В режиме экзамена объяснение появится после ответа.");
    return;
  }

  if(phase === "question" && !answered){
    setHint("Сначала ответь на вопрос. После ответа появится объяснение.", "warn");
    speak("Сначала ответь на вопрос.");
    return;
  }

  if(phase === "question" && answered){
    setHint(`Объяснение: ${step.explanation}`, "info");
    speak(step.explanation);
  }
}

function finish(){
  hideQuiz();
  hideVisual();

  const percent = total ? Math.round((correct / total) * 100) : 0;
  let level = "Нужно повторить алгоритм";

  if(percent >= 85) level = "Экзамен пройден отлично";
  else if(percent >= 70) level = "Экзамен пройден";

  el.phase.textContent = "Экзамен завершён";
  el.title.textContent = "Результат";
  el.text.textContent = "Экзамен СЛР завершён.";
  el.voiceTip.textContent = "Голос: «начать экзамен» для повторного запуска";
  el.result.textContent = `Результат: ${correct} / ${total} (${percent}%).\nИтог: ${level}.\n\nОшибки можно разобрать с инструктором или повторить сценарий.`;
  el.result.classList.add("show");
  setHint("Готово.", "ok");
  showVisual("success", "Экзамен завершён");
  speak(`Экзамен завершён. Результат ${correct} из ${total}.`);
}

function showVisual(type, text){
  el.visualPlaceholder.style.display = "none";
  el.visualCard.classList.add("show");
  el.visualText.textContent = text || "Верно";

  let html = "";

  if(type === "safety" || type === "scan"){
    html = `<div class="scan"></div>`;
    el.visualText.textContent = "Оценка безопасности";
  }else if(type === "breathing"){
    html = `<div class="breathe"></div>`;
    el.visualText.textContent = "Проверка дыхания";
  }else if(type === "pulse"){
    html = `<div class="pulse"></div>`;
    el.visualText.textContent = "Признаки жизни";
  }else if(type === "compressions" || type === "hands"){
    html = `<div class="hand"></div>`;
    el.visualText.textContent = "Компрессии";
  }else if(type === "phone"){
    html = `<div class="phone"></div>`;
    el.visualText.textContent = "Вызов помощи";
  }else if(type === "ventilation"){
    html = `<div class="breathe"></div>`;
    el.visualText.textContent = "Спасательные вдохи";
  }else if(type === "recovery"){
    html = `<div class="recovery"></div>`;
    el.visualText.textContent = "Боковое положение";
  }else if(type === "error"){
    html = `<div class="visualIcon">⚠️</div>`;
    el.visualText.textContent = "Разбор ошибки";
  }else if(type === "success"){
    html = `<div class="visualIcon">✅</div>`;
  }else if(type === "voice"){
    html = `<div class="visualIcon">📣</div>`;
    el.visualText.textContent = "Проверка реакции";
  }else if(type === "touch"){
    html = `<div class="visualIcon">🤲</div>`;
    el.visualText.textContent = "Тактильная проверка";
  }else if(type === "alert"){
    html = `<div class="visualIcon">🚨</div>`;
    el.visualText.textContent = "Критическое состояние";
  }else if(type === "chest"){
    html = `<div class="visualIcon">🫀</div>`;
    el.visualText.textContent = "Грудная клетка";
  }else if(type === "cycle"){
    html = `<div class="visualIcon">30:2</div>`;
    el.visualText.textContent = "Цикл СЛР";
  }else{
    html = `<div class="visualIcon">✅</div>`;
  }

  el.visualGraphic.innerHTML = html;
}

function hideVisual(){
  el.visualCard.classList.remove("show");
  el.visualGraphic.innerHTML = "";
  el.visualText.textContent = "";
  el.visualPlaceholder.style.display = "block";
}

function toggleSide(){
  right = !right;
  el.panel.classList.toggle("right", right);
  el.controls.classList.toggle("right", right);
}

function listen(){
  primeAudio();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    setHint("Голос не поддерживается этим браузером.", "bad");
    return;
  }

  if(recognition){
    try{ recognition.stop(); }catch(e){}
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ru-RU";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  setHint("Слушаю...", "info");
  recognition.start();

  recognition.onresult = event => {
    const text = normalizeText(event.results[0][0].transcript);
    handleVoice(text);
  };

  recognition.onerror = () => {
    setHint("Не удалось распознать голос. Повтори команду.", "bad");
  };
}

function normalizeText(text){
  return String(text || "")
    .toLowerCase()
    .replaceAll("ё","е")
    .replace(/[.,!?;:]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function includesAny(text, words){
  return words.some(word => text.includes(normalizeText(word)));
}

function getAnswerByVoice(text){
  if(phase !== "question" || answered) return null;

  const step = currentStep();

  if(includesAny(text, ["ответ один", "вариант один", "первый", "номер один"]) || text === "один" || text === "1"){
    return 0;
  }

  if(includesAny(text, ["ответ два", "вариант два", "второй", "номер два"]) || text === "два" || text === "2"){
    return 1;
  }

  if(includesAny(text, ["ответ три", "вариант три", "третий", "номер три"]) || text === "три" || text === "3"){
    return 2;
  }

  for(let i = 0; i < step.answers.length; i++){
    const answer = step.answers[i];
    if(answer.keywords && includesAny(text, answer.keywords)){
      return i;
    }
  }

  return null;
}

function handleVoice(text){
  if(text.includes("начать")){
    startExam();
    return;
  }

  const voiceAnswerIndex = getAnswerByVoice(text);
  if(voiceAnswerIndex !== null){
    answerQuestion(voiceAnswerIndex);
    return;
  }

  if(includesAny(text, ["выполнено", "готово", "сделал", "дальше"])){
    next();
    return;
  }

  if(text.includes("объясни")){
    explain();
    return;
  }

  if(text.includes("повтори")){
    speak(lastText || "Пока нечего повторять.");
    return;
  }

  if(text.includes("сторона")){
    toggleSide();
    return;
  }

  if(phase === "question"){
    setHint("Ответ не распознан. Назови вариант или полный ответ.", "warn");
    speak("Ответ не распознан. Назови вариант или полный ответ.");
  }else{
    setHint("Команда не распознана. Скажи: выполнено, объясни или повтори.", "warn");
    speak("Команда не распознана.");
  }
}

const params = new URLSearchParams(location.search);

if(params.get("pos") === "right"){
  toggleSide();
}

if(params.get("start") === "1"){
  startExam();
}
